name: Test Session Start Hook

on:
  push:
    branches: [main, master]
    paths:
      - 'hooks/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'hooks/**'

jobs:
  test-hook:
    # Run on Linux (bash 5+) AND macOS. macOS ships the system bash 3.2.57
    # at /bin/bash, which is exactly the environment where the hook used to
    # fail with "mapfile: command not found". The dedicated bash-3.2 step
    # below is the regression guard for that class of bug.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make hook executable
        run: chmod +x hooks/session-start.sh

      - name: Test hook executes without errors
        run: |
          echo "Testing session-start.sh execution..."

          # Run the hook and capture output
          output=$(./hooks/session-start.sh 2>&1) || true

          # Check if output is valid JSON (when Symfony app is detected)
          # or contains expected warning messages
          if echo "$output" | jq . > /dev/null 2>&1; then
            echo "Hook produced valid JSON output"
          elif [[ "$output" == *"No Symfony application"* ]] || [[ -z "$output" ]]; then
            echo "Hook correctly detected no Symfony app (expected in CI)"
          else
            echo "Unexpected output: $output"
            # Don't fail - hook may produce warnings
          fi

      - name: Test hook with mock Symfony project
        run: |
          echo "Creating mock Symfony project..."

          # Create minimal Symfony-like structure
          mkdir -p /tmp/test-symfony-app
          cd /tmp/test-symfony-app

          # Create composer.json with Symfony dependency
          cat > composer.json << 'EOF'
          {
            "name": "test/symfony-app",
            "require": {
              "symfony/framework-bundle": "^7.0"
            }
          }
          EOF

          # Create bin/console (Symfony CLI marker)
          mkdir -p bin
          touch bin/console
          chmod +x bin/console

          # Run the hook from this directory
          cd /tmp/test-symfony-app
          output=$($GITHUB_WORKSPACE/hooks/session-start.sh 2>&1) || true

          echo "Output: $output"

          # Verify detection worked
          if [[ "$output" == *"symfony"* ]] || [[ "$output" == *"Symfony"* ]]; then
            echo "Hook correctly detected Symfony application!"
          else
            echo "Warning: Symfony detection may need adjustment"
          fi

      - name: Regression — run under system /bin/bash (macOS = bash 3.2.57)
        shell: bash
        run: |
          set -euo pipefail
          echo "System /bin/bash version:"
          /bin/bash --version | head -1

          fail=0

          assert_no_shell_error() {
            # $1 = label, $2 = combined stdout+stderr from running the hook
            local label="$1" out="$2"
            if echo "$out" | grep -Eq 'command not found|unbound variable|mapfile'; then
              echo "::error::[$label] hook emitted a bash 3.2 incompatibility:"
              echo "$out"
              fail=1
            else
              echo "[$label] OK — no bash 3.2 incompatibility"
            fi
          }

          # Case 1: no Symfony app present -> must run clean (no stderr leak)
          empty_dir="$(mktemp -d)"
          out="$(cd "$empty_dir" && /bin/bash "$GITHUB_WORKSPACE/hooks/session-start.sh" 2>&1 || true)"
          assert_no_shell_error "empty-dir" "$out"
          [[ -z "$out" ]] || { echo "::error::[empty-dir] expected no output, got: $out"; fail=1; }

          # Case 2: Symfony app present -> must emit valid JSON
          app_dir="$(mktemp -d)"
          cat > "$app_dir/composer.json" << 'EOF'
          {
            "name": "test/symfony-app",
            "require": { "symfony/framework-bundle": "^7.0" }
          }
          EOF
          mkdir -p "$app_dir/bin" && touch "$app_dir/bin/console"
          out="$(cd "$app_dir" && /bin/bash "$GITHUB_WORKSPACE/hooks/session-start.sh" 2>&1 || true)"
          assert_no_shell_error "symfony-app" "$out"
          if echo "$out" | jq . > /dev/null 2>&1; then
            echo "[symfony-app] OK — valid JSON under bash 3.2"
          else
            echo "::error::[symfony-app] expected valid JSON, got: $out"
            fail=1
          fi

          exit "$fail"

      - name: Validate hooks.json
        run: |
          echo "Validating hooks.json..."

          # Check if hooks.json is valid JSON
          if ! jq . hooks/hooks.json > /dev/null 2>&1; then
            echo "ERROR: hooks.json is not valid JSON"
            exit 1
          fi

          # Check required structure
          if ! jq -e '.hooks' hooks/hooks.json > /dev/null 2>&1; then
            echo "ERROR: hooks.json missing 'hooks' array"
            exit 1
          fi

          echo "hooks.json is valid!"

      - name: Check shell script syntax
        run: |
          echo "Checking shell script syntax..."
          bash -n hooks/session-start.sh
          # Also lint under the macOS system bash 3.2 parser where available
          if [[ -x /bin/bash ]]; then
            /bin/bash -n hooks/session-start.sh
          fi
          echo "Shell syntax is valid!"
